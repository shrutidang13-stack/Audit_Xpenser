services:
  audit-db:
    image: postgres:16
    environment:
      POSTGRES_DB: auditxpenser
      POSTGRES_USER: auditxpenser
      POSTGRES_PASSWORD: auditxpenser
    ports:
      - "5432:5432"
    volumes:
      - auditxpenser-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditxpenser -d auditxpenser"]
      interval: 5s
      timeout: 5s
      retries: 10

  audit-backend:
    build: ./audit/backend
    environment:
      DATABASE_URL: postgresql://auditxpenser:auditxpenser@audit-db:5432/auditxpenser
      AI_PROVIDER: mock
      UPLOAD_DIR: uploads
      APP_ENV: development
      MSME_ENABLED: "true"
      MSME_API_BASE_URL: http://host.docker.internal:3001
      MSME_TIMEOUT_SECONDS: 30
      MSME_API_TOKEN: ""
    ports:
      - "8000:8000"
    volumes:
      - ./audit/backend/uploads:/app/uploads
    depends_on:
      audit-db:
        condition: service_healthy

  audit-frontend:
    build: ./audit/frontend
    environment:
      VITE_API_BASE_URL: ""
    ports:
      - "5173:5173"
    depends_on:
      - audit-backend

volumes:
  auditxpenser-db:
